name: HM Activation (macOS)

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_run:
    workflows: [ "Yolo Update Pins" ]
    types: [ completed ]

jobs:
  hm-activation-macos:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: macos-14
    env:
      TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Run HM activation
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            if scripts/hm-activation-macos.sh; then
              echo "macOS HM activation succeeded."
            else
              echo "::warning::macOS HM activation failed on a pull request. Treating this as advisory because the Darwin dependency closure can drift independently of template export correctness."
              exit 0
            fi
          else
            scripts/hm-activation-macos.sh
          fi
